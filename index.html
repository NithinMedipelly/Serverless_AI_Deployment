<!DOCTYPE html>
<html>
<head>
    <title>ML Prediction Dashboard</title>
</head>
<body>

    <h1>Prediction Dashboard</h1>

    <label>f1:</label><br>
    <input id="f1" value="5.1"><br>

    <label>f2:</label><br>
    <input id="f2" value="3.5"><br>

    <label>f3:</label><br>
    <input id="f3" value="1.4"><br>

    <label>f4:</label><br>
    <input id="f4" value="0.2"><br><br>

    <button onclick="predict()">Predict</button>

    <h2 id="result"></h2>

    <script>
        const apiUrl = "https://p52l1jzyv4.execute-api.us-east-1.amazonaws.com/predict"; // YOUR API

        function predict() {
            const data = {
                f1: parseFloat(document.getElementById("f1").value),
                f2: parseFloat(document.getElementById("f2").value),
                f3: parseFloat(document.getElementById("f3").value),
                f4: parseFloat(document.getElementById("f4").value)
            };

            fetch(apiUrl, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(res => {
                document.getElementById("result").innerText =
                    "Prediction: " + res.prediction;
            })
            .catch(err => {
                document.getElementById("result").innerText =
                    "Error: " + err;
            });
        }
    </script>

</body>
</html>
